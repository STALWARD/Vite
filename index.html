<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. Preconnect to external font domains (e.g., cdnfonts) -->
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin>

    <!-- 2. Preload the most critical local fonts (the ones visible on page load) -->
    <!-- Use "crossorigin" even for local fonts to match how browsers request them -->
    <link rel="preload" href="/fonts/general.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/robert-regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/circularweb-book.woff2" as="font" type="font/woff2" crossorigin>

    <title>my-app</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
